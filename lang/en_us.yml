        title: "§d【Command Help】"
        content: |-
          §d【Command Help】
          ¶†sc={prefix} help¶†§7{prefix} help §e[<command>]§r Show all commands / detailed help for a specific command
          ¶†sc={prefix} make 0 backup only the chunk you are standing on¶†§7{prefix} make §6<chunk radius> §e[<comment>] §r Backup a square of chunks centered on your current chunk with side length 2*radius+1, see §7{prefix} help make
          ¶†sc={prefix} dmake 0,-1 backup all regions of overworld and nether¶†§7{prefix} dmake §6<dimension list> §e[<comment>] §r Backup all regions of the specified dimensions, supports multiple dimensions separated by commas, see §7{prefix} help make
          ¶†sc={prefix} pmake 0 0 -32 -32 in 0 backup chunks between two coordinates¶†§7{prefix} pmake §6<x1> <z1> <x2> <z2> §7in §6<dimension> §e[<comment>] §r Backup chunks in the rectangle defined by two coordinate points, see §7{prefix} help make
          ¶†sc={prefix} back 1¶†§7{prefix} back §e[<backup id>] §r Restore to the specified backup, see §7{prefix} help back
          ¶†sc={prefix} restore¶†§7{prefix} restore §r Restore to the pre-restore backup
          ¶†sc={prefix} del <slot>¶†§7{prefix} del §6<backup id> §r Delete the specified backup, supports multiple IDs, see §7{prefix} help del
          ¶†sc={prefix} confirm¶†§7{prefix} confirm §r Confirm the recent operation
          ¶†sc={prefix} abort¶†§7{prefix} abort §r Abort an operation that hasn't started yet
          ¶†sc={prefix} log list¶†§7{prefix} log list §r View log list, see §7{prefix} help log
          ¶†sc={prefix} list 1¶†§7{prefix} list §e[...] §r List backups, display backup list, see §7{prefix} help list
          ¶†sc={prefix} show 1¶†§7{prefix} show §e<slot> §r Show detailed information of the specified backup, see §7{prefix} help show
          ¶†sc={prefix} reload¶†§7{prefix} reload §r Reload plugin
      arguments:
        title: "§d【Parameters and Terminology】"
        content: |-
          §d【Parameters and Terminology】
          §6Backup ID§r: Identifier of a slot, usually a positive integer, e.g., §61§r, §65§r, §618
          §6Dimension§r: Refers to dimensions defined in the config file. Default: §60§r: Overworld, §6-1§r: Nether, §61§r: End. When multiple dimensions are supported, separate them with commas §6,§r
          §6Dynamic Backup§r: When operating on backups, the target is the dynamic backup pool (when the number of backups reaches the limit, the oldest backup is deleted, cyclic list)
          §6Static Backup§r: Parameter: §6--static/-s §r Switches the target of backup operations to the static backup pool (when the number of backups reaches the limit, no backups are deleted, only new backups are prevented). Usage:
              §71§r. §6{prefix} make 0 -s §r Backup the chunk you are standing on, but store it in static backups
              §72§r. §6{prefix} list 1 -s §r Show the first page of static backups
              Just remember to put the §6-s§r parameter after the command node.
      node_help:
        make: |-
          §d【make command help】§r
          Create a backup, three methods:
          If Carpet mod is present, player data within the selection will also be backed up.
          1. Center on player's current chunk, backup a square of chunks with side length 2*radius+1 (minimum radius 0)
          §7{prefix} make §6<chunk radius> §e[<comment>]§r
          2. Backup chunks between two coordinate points
          §7{prefix} pmake §6<x1> <z1> <x2> <z2> §7in §6<dimension> §e[<comment>] §r
          3. Backup all regions of the specified dimensions, supports multiple dimensions separated by commas §6,§r, e.g., 0 or 0,-1
          §7{prefix} dmake §6<dimension list> §e[<comment>] §r
          §d【Parameters】§r
          §6[<comment>]§r: Optional, defaults to empty
          §r<chunk radius>§r: Center on player's current chunk, selects a square of side length 2*radius+1 (radius minimum 0)
          §r<dimension list>§r: A numeric ID, an integer; default 0=overworld, -1=nether, 1=end, depends on config
          §d【Optional Parameters】§r
          §7--static§r/§7-s§r: Store this backup in static storage
          §d【Examples】§r
          §7{prefix} make 0 --static  Backup current chunk to static storage
          §7{prefix} pmake -10 -10 10 10 in 0  Backup chunks in the rectangle from chunk (-1,-1) to (0,0) in overworld
          §7{prefix} dmake 0,-1 -s  Backup all regions of overworld and nether to static storage

        show: |-
          §d【show command help】§r
          Show detailed information of the specified backup
          §7{prefix} show <backup id> [--options]§r
          §d【Parameters】§r
          §e<backup id>§r: Backup ID, can also be 'overwrite' for pre-restore backup
          §d【Optional Parameters】§r
          §7--static§7/§7-s§r: Show backup information from static storage, not applicable to pre-restore backup
          §7--data§r/§7-d§r: Show player data stored in the backup
          §d【Examples】§r
          §7{prefix} show 1 --static --data
          §7{prefix} show 3 -d
          §7{prefix} show overwrite -d

        list: |-
          §d【list command help】§r
          List backups, display backup list
          §7{prefix} list [<page>] [--options]§r
          §d【Optional Parameters】§r
          §7--static§r/§7-s§r: List backups from static storage
          §7--per-page§r/§7-p §e<per page>§r: Set number of backups per page. Default: §e10§r
          §d【Examples】§r
          §7{prefix} list --static §r
          §7{prefix} list 2 --per-page 20§r
          §7{prefix} list 3 -s -p 20§r

        back: |-
          §d【back command help】§r
          1. Restore to a specific backup, by default player data is not restored, use parameters to enable
          §7{prefix} back §6[<backup id>] §7[--options]§r
          2. Restore to the pre-restore backup
          §7{prefix} restore §7[--options]§r
          §d【Parameters】§r
          §6<backup id>§r: Backup ID. If omitted, the latest backup is used
          §d【Optional Parameters】§r
          §7--static§r/§7-s§r: Restore from static storage, not applicable to pre-restore backup
          §7--data§r/§7-d§r: Also restore player data during restoration
          §7--confirm§r/§7-c§r: Skip confirmation step, start restoration directly
          §d【Examples】§r
          §7{prefix} back --static --confirm
          §7{prefix} back 2 -s -d 
          §7{prefix} restore -d -c

        log: |-
          §d【log command help】§r
          Logs record dangerous operations like backup, restore, delete
          You can view logs to check if tasks completed successfully
          1. Show list of the last 100 dangerous operation logs
          §7{prefix} log list <page>
          2. Show full content of a specific log
          §7{prefix} log show <log name>
          §d【Parameters】§r
          §6<page>§r: If omitted, shows first page
          §6<log name>§r: If omitted, shows the latest log

        del: |-
          §d【del command help】§r
          Delete the specified backups, multiple backups can be specified
          §7{prefix} del <backup ID range> [--options]§r
          Delete all backups
          §7{prefix} del all§r
          §d【Parameters】§r
          §e<backup ID range>§r: Can be a single ID (17), multiple IDs (1,17), a range (1-10), or a mix:
          e.g., 1,5,7,10-20  10-20,10-30,1,2,3  1,2,3,100
          The selected ranges are:
          First: IDs 1 to 20; Second: IDs 1 to 3 and 10 to 30; Third: IDs 1 to 3 and 100
          Note: The command will execute as long as at least one backup in the specified range exists.
          §d【Optional Parameters】§r
          §7--static§r/§7-s§r: Delete backups from static storage
          §d【Examples】§r
          §7{prefix} del 1,2,10-100 --static
          §7{prefix} del 1,2,3
          §7{prefix} del 1 -s

