        restore_backup:
          no_backup: "备份文件夹 {path} 不存在，回档终止"
          no_region: "区域文件{region}在备份里不存在，回档终止，区域文件路径:{path}"
          no_mcc: "区块{x},{z}对应的外部文件{mcc}在备份里不存在，回档终止，外部文件路径:{path}"
          index_error: "解析索引文件失败，回档终止，索引文件路径:{path}"
          lack_index: "备份文件夹缺少索引文件，回档终止，备份文件夹路径:{path}"
          empty_folder: "备份文件夹为空，回档终止，，备份文件夹路径:{path}"
          pre_backup_error: "创建回档前预备份失败，准备启动服务器"
          read_pre_error: "读取预备份信息文件失败，准备启动服务器"
          date_mismatch: "本次恢复存档所需的预备份与实际存在的预备份不一致，准备启动服务器"
