          remove_mcc_error: "删除区块{x},{z}对应的外部文件{mcc}失败，回档终止，外部文件路径:{path}，错误信息:\n{error}"
          pre_restore_ready: "回档出错，检测到存在回档前预备份，正在将世界恢复到回档前状态"
          pre_restore_done: "将存档恢复至回档前状态成功，准备启动服务器"
          pre_restore_error: "使用回档前预备份恢复存档时出现错误，准备启动服务器"

  task:
    _many: '任务{}正在运行,请稍后再试'

    _base:
      no_confirm: 未做出选择, {}任务已终止
      aborted: '{}任务已终止'
    help:
      name: 展示帮助
      commands:
        title: §d【指令帮助】
        content: |-
          §d【指令帮助】
          ¶†sc={prefix} help¶†§7{prefix} help §e[<指令>]§r 展示全部指令/给定指令的详细帮助
          ¶†sc={prefix} make 0 只备份玩家脚下的区块¶†§7{prefix} make §6<区块半径> §e[<注释>] §r以当前区块为中心,备份矩形边长为2倍半径+1的区块,详见§7{prefix} help make
          ¶†sc={prefix} dmake 0,-1 备份主世界与地狱两个维度的所有区域¶†§7{prefix} dmake §6<维度> §e[<注释>] §r备份给定维度的所有区域，支持备份多个维度,详见§7{prefix} help make
          ¶†sc={prefix} pmake 0 0 -32 -32 in 0 备份两个坐标对应的区块坐标之间的区块¶†§7{prefix} pmake §6<x1> <z1> <x2> <z2> §7in §6<维度> §e[<注释>] §r备份两个坐标对应的区块坐标之间的区块,详见§7{prefix} help make
          ¶†sc={prefix} back 1¶†§7{prefix} back §e[<备份id>] §r回档至给定备份,详见§7{prefix} help back
          ¶†sc={prefix} restore¶†§7{prefix} restore §r回档到预备份,即回档前备份
          ¶†sc={prefix} del <slot>¶†§7{prefix} del §6<备份id> §r删除给定备份,可输入多个备份,详见§7{prefix} help del
          ¶†sc={prefix} confirm¶†§7{prefix} confirm §r确认最近的操作
          ¶†sc={prefix} abort¶†§7{prefix} abort §r中断还未开始的的操作
          ¶†sc={prefix} log list¶†§7{prefix} log list §r查看日志列表,详见§7{prefix} help log
          ¶†sc={prefix} list 1¶†§7{prefix} list §e[...] §r列出备份,展示备份列表。详见§7{prefix} help list
          ¶†sc={prefix} show 1¶†§7{prefix} show §e<槽位> §r显示给定备份的信息,详见§7{prefix} help show
          ¶†sc={prefix} reload¶†§7{prefix} reload §r重载插件
      arguments:
        title: §d【参数与名词解释】
        content: |-
          §d【参数与名词解释】
          §6备份id§r: 指定槽位的标识符,大部分情况下只能为正整数,例如: §61§r,§65§r,§618
          §6维度§r: 指代配置文件内存在的维度，默认值：§60§r:主世界,§6-1§r:地狱,§61§r:末地,指令支持多个维度时，每个维度间用逗号§6,§r分隔
          §6动态备份§r: 对备份进行操作时，目标对象默认为动态备份内的备份(即备份数量达到上限后，删除最旧备份，反复循环的列表)
          §6静态备份§r: 参数：§6--static/-s §r本参数把对备份进行操作时的对象改为静态备份内的备份(即备份数量达到上限后，不删除任何备份，只是阻止此次备份的列表)，用法如下：
              §71§r. §6{prefix} make 0 -s §r备份玩家脚下的区块，但是备份存储在静态备份里
              §72§r. §6{prefix} list 1 -s §r展示静态备份第一页的所有备份
              只要记住§6-s§r参数放在对备份进行操作的指令节点后方即可
      node_help:
        make: |-
          §d【make指令帮助】§r
          创建一个备份，目前有三种创建方式
          在服务器有carpet模组的情况下，会备份选区范围内的玩家数据
          1.以玩家当前区块为中心,备份矩形边长为2倍半径+1的区块(半径最小为0)
          §7{prefix} make §6<区块半径> §e[<注释>]§r
          2.备份两个坐标对应的区块坐标之间的区块
          §7{prefix} pmake §6<x1> <z1> <x2> <z2> §7in §6<维度> §e[<注释>] §r
          3.备份给定维度的所有区域,支持多个维度,用§6,§r做区分/§a例:0 或 0,-1
          §7{prefix} dmake §6<维度> §e[<注释>] §r
          §d【参数说明】§r
          §6[<注释>]§r: 一个可选参数，没有的话默认为空
          §r<区块半径>§r: 即以玩家所在区块为中心，框选矩形边长为2倍半径+1的区块(半径最小为0)
          §r<维度>§r: 一个数字id，为一个整数，默认情况下0主世界,-1地狱,1末地，取决于配置文件
          §d【可选参数】§r
          §7--static§r/§7-s§r: 将本次备份存储到静态备份
          §d【例子】§r
          §7{prefix} make 0 --static 备份脚下区块到静态备份
          §7{prefix} pmake -10 -10 10 10 in 0 备份主世界(-1,-1)到(0,0)两个区块坐标范围内的区块
          §7{prefix} dmake 0,-1 -s 备份主世界和下界的所有区域到静态备份

        show: |-
          §d【show指令帮助】§r
          展示给定备份的详细信息
          §7{prefix} show <备份id> [--可选参数]§r
          §d【参数】§r
          §e<备份id>§r: 备份的id,可以为回档前备份overwrite
          §d【可选参数】§r
          §7--static§7/§7-s§r: 展示静态备份里的备份信息,无法用于回档前备份
          §7--data§r/§7-d§r: 展示给定备份里备份的的玩家信息
          §d【例子】§r
          §7{prefix} show 1 --static --data
          §7{prefix} show 3 -d
          §7{prefix} show overwrite -d

        list: |-
          §d【list指令帮助】§r
          列出备份, 展示备份列表
          §7{prefix} list [<页数>] [--可选参数]§r
          §d【可选参数】§r
          §7--static§r/§7-s§r: 列出静态备份里的备份
          §7--per-page§r/§7-p §e<每页行数>§r: 设置每页展示的备份数量。默认: §e10§r
          §d【例子】§r
          §7{prefix} list --static §r
          §7{prefix} list 2 --per-page 20§r
          §7{prefix} list 3 -s -p 20§r

        back: |-
          §d【back指令帮助】§r
          1.回档至给定备份，默认情况下不会同步回档玩家数据，需指定参数
          §7{prefix} back §6[<备份id>] §7[--可选参数]§r
          1.回档至回档前备份，默认情况下不会同步回档玩家数据，需指定参数
          §7{prefix} restore §7[--可选参数]§r
          §d【参数帮助】§r
          §6<备份id>§r: 备份的id。若未给出，则使用最新的备份
          §d【可选参数】§r
          §7--static§r/§7-s§r: 回档静态备份里的备份,无法用于回档前备份
          §7--data§r/§7-d§r: 回档时同时回档玩家数据
          §7--confirm§r/§7-c§r: 跳过确认步骤，直接开始回档
          §d【例子】§r
          §7{prefix} back --static --confirm
          §7{prefix} back 2 -s -d 
          §7{prefix} restore -d -c

        log: |-
          §d【log指令帮助】§r
          日志会记录备份，回档，删除这些危险任务
          你可以通过日志查看任务是否成功完成
          1.显示最近100次危险操作的日志列表
          §7{prefix} log list <页数>
          2.展示给定名称的日志完整内容
          §7{prefix} log show <日志名>
          §d【参数帮助】§r
          §6<页数>§r: 若未给出，则展示第一页
          §6<日志名>§r: 若未给出，则查看最新的日志

        del: |-
          §d【del指令帮助】§r
          删除给定备份,可输入多个备份
          §7{prefix} del <备份id范围> [--可选参数]§r
          删除所有备份
          §7{prefix} del all§r
          §d【参数】§r
          §e<备份id范围>§r: 可以为单个id 17,可以为多个id 1,17,也可以为一个范围 1-10,以下为混合用法:
          例: 1,5,7,10-20  10-20,10-30,1,2,3  1,2,3,100 选中的范围如下:
          第一个:id为1至20的所有备份 第二个:id为1至3与10至30的所有备份 第三个:id为1至3与100的所有备份
          注意: 你输入的范围内只要有一个备份存在，指令都会执行
          §d【可选参数】§r
          §7--static§r/§7-s§r: 删除静态备份里的备份
          §d【例子】§r
          §7{prefix} del 1,2,10-100 --static
          §7{prefix} del 1,2,3
          §7{prefix} del 1 -s

    welcome:
      content: |
        ------ {id} {version} ------
        一个以区块为单位的§a备份§r/§c回档§r插件
        §3作者: FRUITS_CANDY, Bexerlmao
        §d【常用指令】
        ¶†sc={prefix} help¶†§7{prefix} help §e[<指令>]§r 展示全部指令/给定指令的详细帮助
        ¶†sc={prefix} make 0 只备份玩家脚下的区块¶†§7{prefix} make §6<区块半径> §e[<注释>] §r以当前区块为中心,备份矩形边长为2倍半径+1的区块,详见§7{prefix} help make
        ¶†sc={prefix} dmake 0,-1 备份主世界与地狱两个维度的所有区域¶†§7{prefix} dmake §6<维度> §e[<注释>] §r备份给定维度的所有区域，支持备份多个维度,详见§7{prefix} help make
        ¶†sc={prefix} pmake 0 0 -32 -32 in 0 备份两个坐标对应的区块坐标之间的区块¶†§7{prefix} pmake §6<x1> <z1> <x2> <z2> §7in §6<维度> §e[<注释>] §r备份两个坐标对应的区块坐标之间的区块,详见§7{prefix} help make
        ¶†sc={prefix} back 1¶†§7{prefix} back §e[<槽位>] §r回档至给定备份,详见§7{prefix} help back
        ¶†sc={prefix} restore¶†§7{prefix} restore §r回档到预备份,即回档前备份
        ¶†sc={prefix} del <slot>¶†§7{prefix} del §6<槽位> §r删除给定备份,可输入多个备份,详见§7{prefix} help del
        ¶†sc={prefix} confirm¶†§7{prefix} confirm §r确认最近的操作
        ¶†sc={prefix} abort¶†§7{prefix} abort §r中断还未开始的的操作
        ¶†sc={prefix} list 1¶†§7{prefix} list §e[...] §r列出备份,展示备份列表。详见§7{prefix} help list
        ¶†sc={prefix} show 1¶†§7{prefix} show §e<槽位> §r显示给定槽位的信息,详见§7{prefix} help show

      url: "¶†ou=https://github.com/Passion-Never-Dissipate/Chunk_BackUp<>st=点我了解更多用法¶†§d想了解更详细的用法?§b点我了解更多§6<——"

    create_backup:
